<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./CSS/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script src="./script.js" defer></script>
  </head>
  <body>
    <header>
      <!-- Time -->
      <div class="clock">
        <p id="time"><strong></strong></p>
        <p id="date"><strong></strong></p>
      </div>
    </header>
    <main>
      <!-- Name -->
      <div class="name">
        <h1 contenteditable="true">John Doe Dashboard</h1>
      </div>
      <!-- boxes -->
      <div class="boxContainer">
        <div class="box">
          <h2>Snabblänkar</h2>
          <div class="linkAdd">  
            <button> Lägg till länk</button>
          </div>

        </div>
        <div class="box">
          <h2>Väder</h2>
        </div>
        <div class="box">
          <h2>nyheter</h2>
        </div>
        <div class="box" class="textBox">
          <h2>anteckningar</h2>
            <textarea type="text" class="notes">
            </textarea>
          </div>
        </div>
      </div>
    </main>
    <footer>
      <!-- Random bg -->
       <button class="rbg" onclick="bgchange()"><h3>Slumpa ny bakgrund</h3></button>
    </footer>
  </body>
</html>
